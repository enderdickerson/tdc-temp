<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playground Vehicle Browser - 93 Vehicles</title>
<style>
  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface2: #f0f1f4;
    --border: #dfe1e6;
    --text: #1a1d27;
    --text-dim: #6b7185;
    --accent: #3b5bdb;
    --accent2: #0ca678;
    --green: #0ca678;
    --red: #e03131;
    --orange: #e67700;
    --yellow: #9a6700;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.5;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 {
    font-size: 18px; font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .count {
    background: var(--surface2); padding: 4px 12px; border-radius: 12px;
    font-size: 13px; color: var(--text-dim);
  }

  /* Controls */
  .controls {
    padding: 12px 24px;
    display: flex; gap: 10px; flex-wrap: wrap;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .controls input, .controls select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 8px;
    font-size: 14px; outline: none;
  }
  .controls input:focus, .controls select:focus {
    border-color: var(--accent);
  }
  .controls input { flex: 1; min-width: 200px; }
  .controls select { min-width: 140px; }

  /* Layout */
  .layout {
    display: flex; height: calc(100vh - 110px);
  }

  /* Vehicle list */
  .vehicle-list {
    width: 380px; min-width: 380px;
    overflow-y: auto; border-right: 1px solid var(--border);
    background: var(--bg);
  }
  .vehicle-card {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .vehicle-card:hover { background: var(--surface); }
  .vehicle-card.active { background: var(--surface2); border-left: 3px solid var(--accent); }
  .vehicle-card .brand-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 4px;
  }
  .brand-RAM { background: #fde8e8; color: #c92a2a; }
  .brand-JEEP { background: #e6fcf5; color: #087f5b; }
  .brand-DODGE { background: #fff4e6; color: #d9480f; }
  .brand-CHRYSLER { background: #e7f5ff; color: #1864ab; }
  .brand-OTHER { background: var(--surface2); color: var(--text-dim); }
  .vehicle-card .model { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .vehicle-card .meta {
    font-size: 12px; color: var(--text-dim);
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .vehicle-card .price {
    font-size: 14px; font-weight: 600; color: var(--green); margin-top: 4px;
  }
  .vehicle-card .status-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    font-weight: 600;
  }
  .status-KZ { background: #e6fcf5; color: #087f5b; }
  .status-D1 { background: #fff9db; color: #e67700; }
  .status-BX { background: #ffe3e3; color: #c92a2a; }
  .status-other { background: var(--surface2); color: var(--text-dim); }

  /* Detail panel */
  .detail-panel {
    flex: 1; overflow-y: auto; padding: 24px;
  }
  .detail-panel .empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--text-dim); font-size: 16px;
  }

  /* Detail sections */
  .detail-header {
    margin-bottom: 24px;
  }
  .detail-header h2 {
    font-size: 24px; font-weight: 700; margin-bottom: 4px;
  }
  .detail-header .vin {
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--accent); font-size: 14px;
  }

  .info-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .info-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
  }
  .info-card .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-dim); margin-bottom: 4px;
  }
  .info-card .value {
    font-size: 16px; font-weight: 600;
  }
  .info-card .value.money { color: var(--green); }
  .info-card .value.highlight { color: var(--accent); }

  /* Price breakdown */
  .price-bar {
    display: flex; gap: 2px; height: 32px; border-radius: 8px;
    overflow: hidden; margin-bottom: 8px;
  }
  .price-bar div {
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--bg);
  }

  /* Equipment table */
  .section-title {
    font-size: 16px; font-weight: 600; margin: 24px 0 12px 0;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .equip-table {
    width: 100%; border-collapse: collapse;
    background: var(--surface); border-radius: 10px; overflow: hidden;
  }
  .equip-table th {
    text-align: left; padding: 10px 14px;
    background: var(--surface2); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim);
  }
  .equip-table td {
    padding: 8px 14px; border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .equip-table .cat-label {
    color: var(--accent); font-weight: 600; font-size: 12px;
  }
  .equip-table .code { font-family: monospace; color: #9a6700; }
  .equip-table .money { text-align: right; font-family: monospace; }
  .equip-table .total-row {
    font-weight: 700; background: var(--surface2);
  }
  .equip-table .total-row td { border-top: 2px solid var(--border); }

  /* Color swatch */
  .color-swatch {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--border); display: inline-block; vertical-align: middle;
    margin-right: 8px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .layout { flex-direction: column; height: auto; }
    .vehicle-list { width: 100%; min-width: 0; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
    .detail-panel { padding: 16px; }
  }

  /* Print styles */
  @media print {
    .header, .controls, .vehicle-list { display: none; }
    .detail-panel { padding: 0; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Playground Vehicle Browser</h1>
  <span class="count" id="resultCount"></span>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search VIN, model, color, option code..." autocomplete="off">
  <select id="brandFilter"><option value="">All Brands</option></select>
  <select id="statusFilter"><option value="">All Statuses</option></select>
  <select id="sortBy">
    <option value="brand">Sort: Brand</option>
    <option value="msrp-asc">Sort: MSRP Low-High</option>
    <option value="msrp-desc">Sort: MSRP High-Low</option>
    <option value="von">Sort: VON</option>
    <option value="ship">Sort: Ship Date</option>
  </select>
</div>

<div class="layout">
  <div class="vehicle-list" id="vehicleList"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="empty">Select a vehicle to view details</div>
  </div>
</div>

statuses.forEach(s => {

  o.value = s; o.textContent = s;
  statusSel.appendChild(o);
});

function getStatusCode(v) {
  if (v.status_code) return v.status_code;
  const s = v.status || '';
  // Infer code from description fragments
  if (s.includes('invoiced') || s.includes('Released')) return 'KZ';
  if (s.includes('production') || s.includes('Gateline') || s.includes('ship date assigned') || s.includes('is assigned') || s === 'scheduling') return 'D1';
  if (s.includes('cannot')) return 'BX';
  if (s.includes('Tentative schedule')) return 'C';
  if (s.includes('Framing')) return 'E';
  if (s.includes('Trim')) return 'G';
  if (s.includes('pending final inspection')) return 'I';
  return s.split(/[\s-]/)[0] || '?';
}

function fmt(n) {
  if (n == null) return '--';
  return '$' + Number(n).toLocaleString();
}

function getFiltered() {
  let list = [...VEHICLES];
  const search = document.getElementById('search').value.toLowerCase();
  const brand = brandSel.value;
  const status = statusSel.value;
  const sort = document.getElementById('sortBy').value;

  if (search) {
    list = list.filter(v => {
      const hay = JSON.stringify(v).toLowerCase();
      return hay.includes(search);
    });
  }
  if (brand) list = list.filter(v => v.brand === brand);
  if (status) list = list.filter(v => getStatusCode(v) === status);

  if (sort === 'msrp-asc') list.sort((a,b) => (a.total_msrp||0) - (b.total_msrp||0));
  else if (sort === 'msrp-desc') list.sort((a,b) => (b.total_msrp||0) - (a.total_msrp||0));
  else if (sort === 'von') list.sort((a,b) => (a.von||'').localeCompare(b.von||''));
  else if (sort === 'ship') list.sort((a,b) => (a.est_ship_date||'').localeCompare(b.est_ship_date||''));

  return list;
}

  document.getElementById('resultCount').textContent = list.length + ' of ' + VEHICLES.length + ' vehicles';
  const container = document.getElementById('vehicleList');

  container.innerHTML = list.map(v => {
    const sc = getStatusCode(v);
    const statusClass = sc === 'KZ' ? 'status-KZ' : sc === 'BX' ? 'status-BX' : ['D1','C','E','G','I'].includes(sc) ? 'status-D1' : 'status-other';
    const colorName = v.original?.['Paint'] || '';
    return `
      <div class="vehicle-card ${v.von === activeVon ? 'active' : ''}" onclick="showDetail('${v.von}')">
        <span class="brand-badge brand-${v.brand || 'OTHER'}">${v.brand || '?'}</span>
        <span class="status-badge ${statusClass}">${sc}</span>
        <div class="model">${v.model_name || v.vehicle || 'Unknown'}</div>
        <div class="meta">
          <span>VON ${v.von}</span>
          <span>${v.year || ''}</span>
          <span>${colorName || ''}</span>
        </div>
        <div class="price">${fmt(v.total_msrp)} MSRP &nbsp; ${fmt(v.total_fwp)} FWP</div>
      </div>
    `;
  }).join('');
}

function showDetail(von) {
  activeVon = von;
  const v = VEHICLES.find(x => x.von === von);
  if (!v) return;
  renderList();

  const sc = getStatusCode(v);
  const orig = v.original || {};
  const colorName = orig['Paint'] ? orig['Paint'].replace(/^['"]|['"]$/g, '') : '';
  const paintCode = (v.equipment || []).find(e => e.category === 'Paint/Seat/Trim' && !e.code.startsWith('*') && !e.code.startsWith('-') && e.code !== 'APA')?.code || '';
  const swatchColor = PAINT_COLORS[paintCode] || '#888';

  // Price breakdown
  const msrp = v.total_msrp || 0;
  const fwp = v.total_fwp || 0;
  const ep = v.ep || 0;
  const hb = v.holdback || 0;
  const ffp = v.ffp || 0;

  // Equipment rows grouped by category
  const equip = v.equipment || [];
  let equipHtml = '';
  let lastCat = '';
  equip.forEach(e => {
    let catCell = '';
    if (e.category && e.category !== lastCat) {
      catCell = `<td class="cat-label" rowspan="1">${e.category}</td>`;
      lastCat = e.category;
    } else {
      catCell = '<td></td>';
    }
    const msrpStr = e.msrp ? e.msrp.toLocaleString() : '0';
    const fwpStr = e.fwp ? e.fwp.toLocaleString() : '0';
    equipHtml += `<tr>
      ${catCell}
      <td class="code">${e.code}</td>
      <td>${e.description}</td>
      <td class="money">${e.msrp ? '$' + msrpStr : '-'}</td>
      <td class="money">${e.fwp ? '$' + fwpStr : '-'}</td>
    </tr>`;
  });

  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="detail-header">
      <span class="brand-badge brand-${v.brand || 'OTHER'}">${v.brand}</span>
      <h2>${v.year || ''} ${v.model_name || v.vehicle || ''}</h2>
      <div class="vin">${v.vin || 'VIN Pending'}</div>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="label">VON</div>
        <div class="value highlight">${v.von}</div>
      </div>
      <div class="info-card">
        <div class="label">Status</div>
        <div class="value">${sc}${STATUS_MAP[sc] ? ' - ' + STATUS_MAP[sc] : (v.status ? ' - ' + v.status : '')}</div>
      </div>
      <div class="info-card">
        <div class="label">Model Code</div>
        <div class="value">${v.model_code || '--'}</div>
      </div>
      <div class="info-card">
        <div class="label">Exterior Color</div>
        <div class="value"><span class="color-swatch" style="background:${swatchColor}"></span>${colorName || paintCode}</div>
      </div>
      <div class="info-card">
        <div class="label">MSRP</div>
        <div class="value money">${fmt(msrp)}</div>
      </div>
      <div class="info-card">
        <div class="label">FWP (Invoice)</div>
        <div class="value money">${fmt(fwp)}</div>
      </div>
      <div class="info-card">
        <div class="label">FFP</div>
        <div class="value money">${fmt(ffp)}</div>
      </div>
      <div class="info-card">
        <div class="label">EP (Employee Price)</div>
        <div class="value money">${fmt(ep)}</div>
      </div>
      <div class="info-card">
        <div class="label">Holdback</div>
        <div class="value money">${fmt(hb)}</div>
      </div>
      <div class="info-card">
        <div class="label">Dealer Margin (MSRP - FWP)</div>
        <div class="value money">${fmt(msrp - fwp)}</div>
      </div>
      <div class="info-card">
        <div class="label">Date Ordered</div>
        <div class="value">${v.date_ordered || '--'}</div>
      </div>
      <div class="info-card">
        <div class="label">Est. Ship Date</div>
        <div class="value">${v.est_ship_date || '--'}</div>
      </div>
    </div>

    <div class="section-title">Equipment & Options</div>
    <table class="equip-table">
      <thead>
        <tr><th>Category</th><th>Code</th><th>Description</th><th style="text-align:right">MSRP</th><th style="text-align:right">FWP</th></tr>
      </thead>
      <tbody>
        ${equipHtml}
        <tr class="total-row">
          <td colspan="3">Total (incl. Destination)</td>
          <td class="money">${fmt(msrp)}</td>
          <td class="money">${fmt(fwp)}</td>
        </tr>
      </tbody>
    </table>

    <div class="section-title">Price Summary</div>
    <div class="info-grid">
      <div class="info-card">
        <div class="label">MSRP (Sticker)</div>
        <div class="value money">${fmt(msrp)}</div>
      </div>
      <div class="info-card">
        <div class="label">FWP (Factory Wholesale)</div>
        <div class="value money">${fmt(fwp)}</div>
      </div>
      <div class="info-card">
        <div class="label">FFP (Fleet/Fleet Price)</div>
        <div class="value money">${fmt(ffp)}</div>
      </div>
      <div class="info-card">
        <div class="label">EP (Employee Price)</div>
        <div class="value money">${fmt(ep)}</div>
      </div>
      <div class="info-card">
        <div class="label">Holdback</div>
        <div class="value money">${fmt(hb)}</div>
      </div>
      <div class="info-card">
        <div class="label">True Cost (FWP - Holdback)</div>
        <div class="value money">${fmt(fwp - hb)}</div>
      </div>
    </div>
  `;
}

// Event listeners
document.getElementById('search').addEventListener('input', renderList);
brandSel.addEventListener('change', renderList);
statusSel.addEventListener('change', renderList);
document.getElementById('sortBy').addEventListener('change', renderList);

// Keyboard nav
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  const list = getFiltered();
  const idx = list.findIndex(v => v.von === activeVon);
  if (e.key === 'ArrowDown' && idx < list.length - 1) {
    e.preventDefault();
    showDetail(list[idx + 1].von);
    document.querySelector('.vehicle-card.active')?.scrollIntoView({ block: 'nearest' });
  }
  if (e.key === 'ArrowUp' && idx > 0) {
    e.preventDefault();
    showDetail(list[idx - 1].von);
    document.querySelector('.vehicle-card.active')?.scrollIntoView({ block: 'nearest' });
  }
});

// Initial render
renderList();
</script>

</body>
</html>
