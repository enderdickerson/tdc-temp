<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Drive Center - Vehicle Grid (93 Vehicles)</title>
<style>
  :root {
    --bg: #f5f6f8; --surface: #fff; --border: #dfe1e6;
    --text: #1a1d27; --dim: #6b7185; --accent: #3b5bdb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.4;
  }

  .toolbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .toolbar h1 {
    font-size: 16px; font-weight: 700; white-space: nowrap;
    color: var(--text);
  }
  .toolbar .count {
    background: #edf2ff; color: #3b5bdb; padding: 3px 10px;
    border-radius: 10px; font-size: 12px; font-weight: 600; white-space: nowrap;
  }
  .toolbar input, .toolbar select {
    background: #f0f1f4; border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 6px; font-size: 13px; outline: none;
  }
  .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
  .toolbar input { width: 220px; }
  .toolbar select { min-width: 120px; }
  .spacer { flex: 1; }

  .summary {
    display: flex; gap: 20px; padding: 10px 20px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--dim); flex-wrap: wrap; align-items: center;
  }
  .summary .stat { display: flex; align-items: center; gap: 4px; }
  .summary .stat strong { color: var(--text); font-size: 14px; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 1400px; }
  thead { position: sticky; top: 0; z-index: 50; }
  th {
    background: #2c3e50; color: #ecf0f1; padding: 8px 10px;
    text-align: left; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px;
    white-space: nowrap; cursor: pointer; user-select: none;
    border-right: 1px solid #3d5166;
  }
  th:hover { background: #34495e; }
  td {
    padding: 7px 10px; border-bottom: 1px solid #eef0f3;
    vertical-align: top;
  }
  tr:hover td { background: #f8f9fc; }
  tr.pair-even td { background: #fafbfd; }
  tr.pair-even:hover td { background: #f0f2f8; }

  .brand { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.3px; }
  .brand-RAM { background: #fde8e8; color: #c92a2a; }
  .brand-JEEP { background: #e6fcf5; color: #087f5b; }
  .brand-DODGE { background: #fff4e6; color: #d9480f; }
  .brand-CHRYSLER { background: #e7f5ff; color: #1864ab; }

  .status {
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 10px; display: inline-block; white-space: nowrap;
  }
  .status-transit { background: #d3f9d8; color: #2b8a3e; }
  .status-order { background: #fff3bf; color: #8a6d00; }
  .singleton-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: #ffe3e3; color: #c92a2a; margin-left: 6px; vertical-align: middle; }

  .color-cell { display: flex; align-items: flex-start; gap: 6px; white-space: nowrap; }
  .swatch {
    width: 14px; height: 14px; border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15); flex-shrink: 0; margin-top: 1px;
  }

  .vin { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; color: var(--dim); }
  .von { font-weight: 600; color: var(--accent); }
  .price { font-weight: 600; white-space: nowrap; }
  .dim { color: var(--dim); }
  .model-name { font-weight: 600; white-space: nowrap; }

  .ship-date { font-weight: 500; white-space: nowrap; }
  .ship-date.past { color: #2b8a3e; }
  .ship-date.future { color: #e67700; }
  .scan-loc { font-size: 11px; color: #5c7cfa; font-weight: 500; }
  .status-detail { font-size: 11px; color: var(--dim); margin-top: 2px; max-width: 220px; white-space: normal; line-height: 1.3; }
  .status-code { font-size: 10px; font-weight: 600; color: #868e96; margin-left: 4px; }

  /* Paid options pills */
  .opts {
    display: flex; flex-wrap: wrap; gap: 3px; max-width: 420px;
  }
  .opt-pill {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; padding: 2px 7px; border-radius: 4px;
    background: #f0f1f4; white-space: nowrap;
  }
  .opt-pill .opt-price {
    color: #2b8a3e; font-weight: 600; font-size: 10px;
  }
  .opt-pill.is-pkg {
    background: #edf2ff; border: 1px solid #d0d7f7;
  }
  .opt-pill.is-paint {
    background: #fff9db; border: 1px solid #f0e3a0;
  }
  .opt-pill.is-seat {
    background: #ffe8cc; border: 1px solid #f0d4a8;
  }
  .opt-pill.is-engine {
    background: #e6fcf5; border: 1px solid #b2f2d8;
  }

  .no-results {
    text-align: center; padding: 40px; color: var(--dim); font-size: 15px;
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>Test Drive Center Inventory</h1>
  <span class="count" id="resultCount">93 vehicles</span>
  <div class="spacer"></div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <input type="text" id="search" placeholder="Search VON, VIN, model, color, option..." oninput="render()">
    <select id="brandFilter" onchange="render()"><option value="">All Brands</option></select>
    <select id="statusFilter" onchange="render()"><option value="">All Statuses</option></select>
    <select id="sortSelect" onchange="render()">
      <option value="brand">Sort: Brand / Model</option>
      <option value="msrp-desc">Sort: MSRP High-Low</option>
      <option value="msrp-asc">Sort: MSRP Low-High</option>
      <option value="ship">Sort: Est Ship Date</option>
      <option value="von">Sort: VON</option>
      <option value="color">Sort: Color</option>
    </select>
    <label style="display:inline-flex;align-items:center;font-size:13px;cursor:pointer;white-space:nowrap;user-select:none"><input type="checkbox" id="uniqueToggle" checked onchange="render()" style="cursor:pointer;margin:0 4px 0 0;width:14px;height:14px">Unique configs only</label>
  </div>
</div>
<div class="summary" id="summary"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Brand</th>
        <th>Model / Trim</th>
        <th>Ext. Color</th>
        <th>Interior</th>
        <th>Powertrain</th>
        <th>Paid Options</th>
        <th>MSRP</th>
        <th>Status</th>
        <th>VON</th>
        <th>VIN</th>
        <th>Ship Date</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="no-results" id="noResults" style="display:none">No vehicles match your filters</div>
</div>

const COLOR_MAP = {
  'bright white': '#f5f5f0', 'white knuckle': '#f0efe8',
  'diamond black': '#1a1a2e', 'high gloss black': '#0d0d0d', 'black': '#111',
  'hydro blue': '#3498db', 'fathom blue': '#2c3e82', 'steel blue': '#4682b4',
  'b5 blue': '#4169e1', 'forged blue': '#355e8c', 'bludicrous': '#2e4bff',
  'serrano green': '#6b8e23', 'green machine': '#3d8b37', 'mojito': '#a8e048',
  'molten red': '#b22222', 'velvet red': '#8b1a4a', 'firecracker red': '#cc2200',
  'redeye': '#cc0000',
  'granite crystal': '#808080', 'silver zynith': '#c0c0c0', 'night moves': '#3a3a4a',
  'baltic grey': '#7f8c8d', 'vapor gray': '#9aa0a6',
  'copper shino': '#b87333', "'41": '#6b4c3b', 'joose': '#ff8c00',
  'reign': '#7b3fa0',
};

function getSwatchColor(name) {
  const n = name.toLowerCase();
  for (const [key, val] of Object.entries(COLOR_MAP)) {
    if (n.includes(key)) return val;
  }
  return '#ccc';
}

function fmt$(n) {
  if (!n) return '-';
  return '$' + Number(n).toLocaleString();
}

function fmtDate(d) {
  if (!d) return '';
  const p = d.split('-');
  if (p.length === 3) return p[1] + '/' + p[2] + '/' + p[0].slice(2);
  return d;
}

const brands = [...new Set(V.map(v => v.brand).filter(Boolean))].sort();
const statuses = [...new Set(V.map(v => v.reporting_status).filter(Boolean))].sort();
const brandSel = document.getElementById('brandFilter');
const statusSel = document.getElementById('statusFilter');
brands.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; brandSel.appendChild(o); });
statuses.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; statusSel.appendChild(o); });

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const brand = brandSel.value;
  const status = statusSel.value;
  const sort = document.getElementById('sortSelect').value;

  let list = V.filter(v => {
    if (brand && v.brand !== brand) return false;
    if (status && v.reporting_status !== status) return false;
    if (q) {
      const optText = (v.paid_opts || []).map(o => o.code + ' ' + o.desc).join(' ');
      const hay = [v.von, v.vin, v.brand, v.model_base, v.trim, v.color_name,
                   v.interior, v.engine, v.seat, v.model_code, v.package, optText].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const cmp = (a, b, k) => (a[k] || '').localeCompare(b[k] || '');
  switch(sort) {
    case 'brand': list.sort((a,b) => cmp(a,b,'brand') || cmp(a,b,'model_base') || cmp(a,b,'trim')); break;
    case 'msrp-desc': list.sort((a,b) => (b.msrp||0) - (a.msrp||0)); break;
    case 'msrp-asc': list.sort((a,b) => (a.msrp||0) - (b.msrp||0)); break;
    case 'ship': list.sort((a,b) => (a.est_ship||'z').localeCompare(b.est_ship||'z')); break;
    case 'von': list.sort((a,b) => a.von.localeCompare(b.von)); break;
    case 'color': list.sort((a,b) => cmp(a,b,'color_name')); break;
  }

  if (document.getElementById('uniqueToggle').checked) {
    const seen = new Set();
    list = list.filter(v => {
      const optKey = (v.paid_opts || []).map(o => o.code).sort().join(',');
      const key = [v.model_base, v.trim, v.paint_code, optKey].join('|');
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  const transit = list.filter(v => v.reporting_status === 'In Transit').length;
  const openOrd = list.filter(v => v.reporting_status === 'Open Order').length;
  const brandCounts = {};
  list.forEach(v => { brandCounts[v.brand] = (brandCounts[v.brand]||0) + 1; });
  const brandSummary = Object.entries(brandCounts).sort((a,b) => b[1]-a[1])
    .map(([b,c]) => `<span class="brand brand-${b}">${b}</span> ${c}`).join('&nbsp;&nbsp;');

  document.getElementById('summary').innerHTML = `
    <div class="stat"><strong>${list.length}</strong> shown</div>
    <div class="stat"><strong>${transit}</strong> in transit</div>
    <div class="stat"><strong>${openOrd}</strong> open orders</div>
    <div class="spacer"></div>
    <div class="stat">${brandSummary}</div>
  `;
  document.getElementById('resultCount').textContent = list.length + ' of ' + V.length;

  const tbody = document.getElementById('tbody');
  if (list.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('noResults').style.display = 'block';
    return;
  }
  document.getElementById('noResults').style.display = 'none';

  const today = new Date().toISOString().slice(0, 10);

  let html = '';
  let pairIdx = 0, prevKey = '';
  for (const v of list) {
    const key = v.model_code + v.trim + v.color_name;
    if (key !== prevKey) { pairIdx++; prevKey = key; }
    const rowClass = pairIdx % 2 === 0 ? 'pair-even' : '';
    const statusClass = v.reporting_status === 'In Transit' ? 'status-transit' : 'status-order';
    const swatchColor = getSwatchColor(v.color_name);
    const shipClass = v.est_ship ? (v.est_ship <= today ? 'past' : 'future') : '';

    // Build engine short name
    let engineShort = v.engine || '-';
    engineShort = engineShort.replace(/Engine.*/, '').replace(/w\/ESS/, '').trim();

    // Build paid options pills
    let optHtml = '';
    if (v.paid_opts && v.paid_opts.length > 0) {
      optHtml = '<div class="opts">';
      for (const o of v.paid_opts) {
        optHtml += `<span class="opt-pill" title="${o.desc}"><span>${o.desc}</span> <span class="opt-price">${fmt$(o.msrp)}</span></span>`;
      }
      optHtml += '</div>';
    } else {
      optHtml = '<span class="dim">Base only</span>';
    }

    // Color cell with cost if any
    let colorExtra = v.color_msrp > 0 ? ` <span class="opt-price" style="font-size:10px">+${v.color_msrp}</span>` : '';

    // Seat with cost if any
    let seatInfo = v.seat || '-';
    if (v.seat_msrp > 0) seatInfo += ` <span class="opt-price" style="font-size:10px">+${fmt$(v.seat_msrp)}</span>`;

    html += `<tr class="${rowClass}">
      <td><span class="brand brand-${v.brand}">${v.brand}</span></td>
      <td><span class="model-name">${v.model_base}</span>${v.singleton ? '<span class="singleton-badge">1-of-1</span>' : ''}<br><span style="font-weight:500">${v.trim}</span> <span class="dim" style="font-size:11px">${v.body_info}</span></td>
      <td><div class="color-cell">
        <span class="swatch" style="background:${swatchColor}"></span>
        <span>${v.color_name}${colorExtra}</span>
      </div></td>
      <td class="dim" style="white-space:nowrap">${v.interior || '-'}<br><span style="font-size:11px">${v.seat || ''}</span></td>
      <td class="dim" style="white-space:nowrap;font-size:12px">${engineShort}<br>${v.transmission || ''}</td>
      <td>${optHtml}</td>
      <td class="price">${fmt$(v.msrp)}</td>
      <td><span class="status ${statusClass}">${v.reporting_status || '-'}</span><span class="status-code">${v.status_code || ''}</span>
        ${v.status_detail && v.status_detail !== 'OEM' ? '<div class="status-detail">' + v.status_detail + '</div>' : ''}
        ${v.scan_loc ? '<span class="scan-loc">' + v.scan_loc + '</span>' : ''}</td>
      <td class="von">${v.von}</td>
      <td class="vin">${v.vin || '-'}</td>
      <td class="ship-date ${shipClass}">${fmtDate(v.est_ship) || '-'}</td>
    </tr>`;
  }
  tbody.innerHTML = html;
}

render();
</script>
